services:
  - type: web
    name: configforge-ai
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: CONFIGFORGE_MODEL_MODE
        value: deterministic
      - key: CONFIGFORGE_OUTPUT_DIR
        value: outputs/generated_configs
