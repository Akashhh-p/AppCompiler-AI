services:
  - type: web
    name: configforge-ai
    runtime: python
    rootDir: .
    plan: free
    buildCommand: python -m pip install --upgrade pip && python -m pip install -r requirements.txt
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: CONFIGFORGE_MODEL_MODE
        value: deterministic
      - key: CONFIGFORGE_OUTPUT_DIR
        value: outputs/generated_configs
